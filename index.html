<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abir Al Horof | عبير الحروف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="maintenance-style.css">
</head>
<body>
  <div class="maintenance-container">
    <!-- Logo -->
    <div class="logo-section">
      <img src="src/image/logo.png" alt="Logo Abir Al Horof" class="maintenance-logo">
      <div class="brand-text">
        <h1 class="brand-name">Abir Al Horof</h1>
        <p class="brand-tagline">Club de poésie et de musique</p>
      </div>
    </div>

    <!-- Maintenance Message -->
    <div class="maintenance-content">
      <div class="maintenance-icon">🔧</div>
      
      <h2 class="maintenance-title">Page en cours de maintenance</h2>
      <p class="maintenance-subtitle">عبير الحروف في صيانة</p>
      
      <p class="maintenance-message">
        Nous optimisons notre site pour vous offrir une meilleure expérience.
      </p>
      <p class="maintenance-message-ar">
        نحن نحسّن موقعنا لتقديم أفضل تجربة لك.
      </p>
      
      <p class="maintenance-time">
        ⏱️ Revenez très bientôt | عودوا قريباً جداً
      </p>
    </div>

    <!-- Contact Info -->
    <div class="contact-section">
      <p class="contact-text">Pour toute question :</p>
      <p class="contact-text-ar">لأي استفسار:</p>
      <div class="social-links">
        <a href="https://facebook.com" target="_blank" aria-label="Facebook" class="social-link">
          <img src="src/image/Facebook_logo.svg" alt="Facebook">
        </a>
        <a href="https://instagram.com" target="_blank" aria-label="Instagram" class="social-link">
          <img src="src/image/Instagram_logo.webp" alt="Instagram">
        </a>
        <a href="https://whatsapp.com" target="_blank" aria-label="WhatsApp" class="social-link">
          <img src="src/image/WhatsApp_Logo.webp" alt="WhatsApp">
        </a>
      </div>
    </div>

    <!-- Animation -->
    <div class="animation-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .maintenance-container {
      animation: fadeInScale 0.8s ease-out;
    }

    .logo-section {
      animation: slide-up 0.8s ease-out 0.2s both;
    }

    .maintenance-content {
      animation: slide-up 0.8s ease-out 0.4s both;
    }

    .contact-section {
      animation: slide-up 0.8s ease-out 0.6s both;
    }

    .dot {
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }
  </style>
</body>
</html>
